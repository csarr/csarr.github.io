<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>{{PAGE_TITLE}} · Dashboard agrégation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f4f1ea;
      --card: #fffaf0;
      --ink: #1f2933;
      --muted: #6b7280;
      --border: #e5dcc9;
      --s1: #9ca3af;
      --s2: #a70a6b;
      --s3: #f59e0b;
      --s4: #d3d950;
      --s5: #427525;
    }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); }
    main { width: min(1100px, calc(100% - 32px)); margin: 0 auto; padding: 40px 0; }
    h1 { margin: 0 0 16px; letter-spacing: -0.03em; }
    .back-link { display: inline-block; margin-bottom: 18px; color: #1d4ed8; text-decoration: none; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 20px; }
    h2 { margin: 0 0 12px; font-size: 1.05rem; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); font-weight: 600; }
    .status-dot { width: 12px; height: 12px; border-radius: 999px; display: inline-block; vertical-align: middle; }
    .status-1 { background: var(--s1); }
    .status-2 { background: var(--s2); }
    .status-3 { background: var(--s3); }
    .status-4 { background: var(--s4); }
    .status-5 { background: var(--s5); }
    .action-buttons { display: inline-flex; gap: 8px; }
    .action-btn { display: inline-block; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border); text-decoration: none; color: #1d4ed8; background: #fff; font-size: 0.85rem; }
    .action-btn:hover { background: #eff6ff; }
  </style>
</head>
<body>
  <main>
    <a class="back-link" href="../index.html">← Retour au dashboard</a>
    <h1>{{PAGE_TITLE}}</h1>
    <section class="card">
      <h2>Avec étoile</h2>
      <table>
        <thead>
          <tr>
            <th>{{HEADER_1}}</th>
            <th>{{HEADER_2}}</th>
            <th>{{HEADER_3}}</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {{STARRED_ROWS}}
        </tbody>
      </table>
    </section>

    <section class="card">
      <h2>Autres développements</h2>
      <table>
        <thead>
          <tr>
            <th>{{HEADER_1}}</th>
            <th>{{HEADER_2}}</th>
            <th>{{HEADER_3}}</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {{TABLE_ROWS}}
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
